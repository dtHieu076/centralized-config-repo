# Server
server.port=8083

# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/workflow_db
spring.datasource.username=workflow_user
spring.datasource.password=workflow_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Camunda 8 Zeebe
zeebe.client.broker.gateway-address=localhost:26500
zeebe.client.security.plaintext=true
zeebe.client.request-timeout=30s
camunda.client.zeebe.max-message-size=4MB

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Kafka
spring.kafka.consumer.group-id=workflow-service-group