# ===================================================================
# CONFIG RIÊNG CHO PHÂN HỆ LUỒNG (WORKFLOW-SERVICE)
# ===================================================================

server.port=8083

# Cấu hình kết nối Database PostgreSQL độc lập của Workflow (Dùng để validate schema và lưu task history)
spring.datasource.url=jdbc:postgresql://localhost:5432/workflow_db
spring.datasource.username=workflow_user
spring.datasource.password=workflow_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Cấu hình lõi điều hướng Camunda 8 Zeebe Broker (BPMN Engine Local)
zeebe.client.broker.gateway-address=localhost:26500
zeebe.client.security.plaintext=true
zeebe.client.request-timeout=30s
camunda.client.zeebe.max-message-size=4MB

# Mở tài liệu API Swagger phục vụ việc test luồng nội bộ
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Định danh nhóm Consumer lắng nghe Kafka dành riêng cho Workflow
spring.kafka.consumer.group-id=workflow-service-group